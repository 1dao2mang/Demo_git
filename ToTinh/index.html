<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Em ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container" id="main-container">
        <div class="glass-card">
            <div class="avatar-glow">
                <img src="https://i.pinimg.com/originals/cf/4e/15/cf4e15642a84988ce2eaab1c64fd6ff1.gif" alt="Cute Bear" class="cute-gif" id="main-gif">
            </div>
            
            <h1 class="title">Này cô gái nhỏ ơi... 💕</h1>
            <p class="message" id="question-text">Em làm người yêu anh nhé? Anh hứa sẽ luôn làm em cười! 🥰</p>
            
            <div class="buttons">
                <button class="btn btn-yes" id="btn-yes">Đồng ý luôn! 💖</button>
                <button class="btn btn-no" id="btn-no">Từ chối 💔</button>
            </div>
        </div>
    </div>

    <!-- Celebration Screen (hidden initially) -->
    <div class="celebration" id="celebration" style="display: none;">
        <h1 class="celebration-title">Anh biết mà!!! Yêu em nhiều lắmmm ❤️❤️❤️</h1>
        <img src="https://media.tenor.com/gUiu1zyxfzYAAAAi/bear-kiss-bear-kisses.gif" alt="Kiss Bear" class="celebration-gif">
        <p class="celebration-text">Kể từ bây giờ, em là của anh rồi nhé! 🔒</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
